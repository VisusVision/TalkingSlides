name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_heavy_load:
        description: "Run heavy load profile (requires secrets and longer runtime)"
        required: false
        default: "false"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt -r requirements-test.txt
          pip install pip-audit

      - name: Migration check
        working-directory: services/api
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          USE_SQLITE_FOR_TESTS: "1"
        run: python manage.py makemigrations --check --dry-run

      - name: Backend tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          USE_SQLITE_FOR_TESTS: "1"
        run: pytest -q tests

      - name: Python dependency audit
        run: pip-audit -r services/api/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: services/frontend
        run: npm ci

      - name: Frontend tests
        working-directory: services/frontend
        run: npm run test:ci

      - name: Frontend build
        working-directory: services/frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: services/frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend e2e smoke
        working-directory: services/frontend
        run: npm run e2e

      - name: npm audit (high+critical)
        working-directory: services/frontend
        run: npm audit --audit-level=high

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build smoke
        run: docker compose -f infra/docker-compose.yml build api worker tts_service

  loadtest-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: k6 smoke syntax
        uses: grafana/setup-k6-action@v1
      - name: Validate k6 script
        run: k6 inspect infra/loadtest/k6-production-sprint.js
