name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_heavy_load:
        description: "Run heavy load profile (requires secrets and longer runtime)"
        required: false
        default: "false"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            services/api/requirements.txt
            requirements-test.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt -r requirements-test.txt
          pip install pip-audit

      - name: Install media tooling (ffprobe)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Migration check
        working-directory: services/api
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          USE_SQLITE_FOR_TESTS: "1"
        run: python manage.py makemigrations --check --dry-run

      - name: Backend tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          USE_SQLITE_FOR_TESTS: "1"
        run: pytest -q tests --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-junit
          path: pytest-report.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Python dependency audit
        run: pip-audit -r services/api/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: services/frontend
        run: npm ci

      - name: Frontend tests
        working-directory: services/frontend
        run: |
          if npm run | grep -q "test:ci"; then
            npm run test:ci
          else
            npm test
          fi

      - name: Frontend build
        working-directory: services/frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: services/frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend e2e smoke
        working-directory: services/frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            services/frontend/playwright-report
            services/frontend/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: npm audit (high+critical)
        working-directory: services/frontend
        run: npm audit --audit-level=high

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - name: Prepare Docker Compose env file
        run: touch infra/.env
      - name: Set up Docker Buildx
        run: docker buildx create --use --name ci-builder
      - name: Docker build smoke
        working-directory: infra
        env:
          DOCKER_BUILD_CACHE_SCOPE: docker-smoke-${{ github.ref_name }}
        run: |
          docker buildx bake \
            --file docker-compose.yml \
            --progress=plain \
            --set "*.cache-from=type=gha,scope=${DOCKER_BUILD_CACHE_SCOPE}" \
            --set "*.cache-to=type=gha,scope=${DOCKER_BUILD_CACHE_SCOPE},mode=max,ignore-error=true" \
            api worker tts_service

  loadtest-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: k6 smoke syntax
        uses: grafana/setup-k6-action@v1
      - name: Validate k6 script
        run: k6 inspect infra/loadtest/k6-production-sprint.js
