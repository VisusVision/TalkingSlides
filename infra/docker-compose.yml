# ============================================================
# AI_ACADEMY – local development Docker Compose
# ============================================================
# Services:
#   api         – Django REST backend
#   tts_service – FastAPI text-to-speech service
#   worker      – Celery async task worker
#   redis       – message broker / cache
#   postgres    – primary relational database
#   minio       – S3-compatible local object storage
#   frontend    – Vite React frontend
# ============================================================

# Local runtime media is stored in repo-root storage_local/ and
# mounted into app containers as /app/storage_local.
x-python-common: &python-common
  env_file: .env
  restart: unless-stopped
  networks:
    - academy_net

x-visual-moderation-env: &visual-moderation-env
  VISUAL_MODERATION_BLOCK_RENDER_ON_REJECTION: "${VISUAL_MODERATION_BLOCK_RENDER_ON_REJECTION:-true}"
  VISUAL_MODERATION_BLOCK_PUBLISH_ON_REJECTION: "${VISUAL_MODERATION_BLOCK_PUBLISH_ON_REJECTION:-true}"
  VISUAL_MODERATION_REQUIRE_SEMANTIC_PROVIDER: "${VISUAL_MODERATION_REQUIRE_SEMANTIC_PROVIDER:-true}"
  ALLOW_WEAK_LOCAL_VISUAL_APPROVAL: "${ALLOW_WEAK_LOCAL_VISUAL_APPROVAL:-false}"
  VISUAL_SAFETY_PROVIDER: "${VISUAL_SAFETY_PROVIDER:-none}"
  VISUAL_SAFETY_CLASSIFIER_ENABLED: "${VISUAL_SAFETY_CLASSIFIER_ENABLED:-false}"
  VISUAL_SAFETY_TIMEOUT_SECONDS: "${VISUAL_SAFETY_TIMEOUT_SECONDS:-20}"
  VISUAL_SAFETY_MAX_IMAGE_BYTES: "${VISUAL_SAFETY_MAX_IMAGE_BYTES:-10485760}"
  AZURE_CONTENT_SAFETY_ENABLED: "${AZURE_CONTENT_SAFETY_ENABLED:-false}"
  AZURE_CONTENT_SAFETY_ENDPOINT: "${AZURE_CONTENT_SAFETY_ENDPOINT:-}"
  AZURE_CONTENT_SAFETY_KEY: "${AZURE_CONTENT_SAFETY_KEY:-}"
  AZURE_CONTENT_SAFETY_API_VERSION: "${AZURE_CONTENT_SAFETY_API_VERSION:-2024-09-01}"
  AZURE_CONTENT_SAFETY_CATEGORIES: "${AZURE_CONTENT_SAFETY_CATEGORIES:-sexual,violence,self_harm,hate}"
  AZURE_CONTENT_SAFETY_BLOCK_SEVERITY: "${AZURE_CONTENT_SAFETY_BLOCK_SEVERITY:-4}"
  TEXT_SAFETY_PROVIDER: "${TEXT_SAFETY_PROVIDER:-}"
  TEXT_SAFETY_CLASSIFIER_ENABLED: "${TEXT_SAFETY_CLASSIFIER_ENABLED:-}"
  TEXT_SAFETY_TIMEOUT_SECONDS: "${TEXT_SAFETY_TIMEOUT_SECONDS:-20}"
  TEXT_SAFETY_CATEGORIES: "${TEXT_SAFETY_CATEGORIES:-sexual,violence,self_harm,hate}"
  TEXT_SAFETY_BLOCK_SEVERITY: "${TEXT_SAFETY_BLOCK_SEVERITY:-4}"
  TEXT_SAFETY_FALLBACK_PROVIDER: "${TEXT_SAFETY_FALLBACK_PROVIDER:-local_rules}"

services:

  # ----------------------------------------------------------
  # Django API
  # ----------------------------------------------------------
  api:
    <<: *python-common
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.api
      args:
        INSTALL_TEST_DEPS: "${INSTALL_TEST_DEPS:-1}"
    image: ai_academy_api:local
    user: root
    entrypoint: [ "sh", "/usr/local/bin/local-storage-entrypoint.sh" ]
    command: [ "sh", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers 2 config.wsgi:application" ]
    ports:
      - "8000:8000"
    volumes:
      # Mount only the service source so the image /app is not overwritten
      - ../services/api:/app
      - ../services/avatar:/app/avatar
      - ../services/worker:/app/worker:ro
      - ../services/scripts:/app/scripts:ro
      - ../services/tts_service/tts_preprocess:/app/tts_preprocess:ro
      - ../services:/app/services:ro
      - ../infra:/app/infra:ro
      - ../tests:/app/tests:ro
      - ../infra/dockerfiles/local-storage-entrypoint.sh:/usr/local/bin/local-storage-entrypoint.sh:ro
      - ../storage_local:/app/storage_local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      <<: *visual-moderation-env
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONPATH: /app:/app/worker:/app/scripts:/app/tts_preprocess:/app/services
      DJANGO_DISABLE_STATIC_COMPRESSION: "true"
      STORAGE_ROOT: /app/storage_local
      LOCAL_STORAGE_PERMISSIVE_CHMOD: "${LOCAL_STORAGE_PERMISSIVE_CHMOD:-1}"
      LOCAL_STORAGE_DIR_MODE: "${LOCAL_STORAGE_DIR_MODE:-0777}"
      CELERY_RENDER_QUEUE: "${CELERY_RENDER_QUEUE:-render}"
      CELERY_AVATAR_QUEUE: "${CELERY_AVATAR_QUEUE:-avatar}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------
  # FastAPI TTS Service
  # ----------------------------------------------------------
  tts_service:
    <<: *python-common
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.tts
      args:
        INSTALL_TEST_DEPS: "${INSTALL_TEST_DEPS:-1}"
    image: ai_academy_tts:local
    user: root
    entrypoint: [ "sh", "/usr/local/bin/local-storage-entrypoint.sh" ]
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001" ]
    gpus: all
    ports:
      - "8001:8001"
    volumes:
      - ../services/tts_service:/app
      - ../tests:/app/tests:ro
      - ../services:/app/services:ro
      - ../infra/dockerfiles/local-storage-entrypoint.sh:/usr/local/bin/local-storage-entrypoint.sh:ro
      - ../storage_local:/app/storage_local
    depends_on:
      - redis
    environment:
      STORAGE_ROOT: /app/storage_local
      LOCAL_STORAGE_PERMISSIVE_CHMOD: "${LOCAL_STORAGE_PERMISSIVE_CHMOD:-1}"
      LOCAL_STORAGE_DIR_MODE: "${LOCAL_STORAGE_DIR_MODE:-0777}"
      COQUI_TOS_AGREED: "1"
      XTTS_ENABLED: "1"
      XTTS_PRELOAD_ON_STARTUP: "1"
      XTTS_WARMUP_BLOCKING: "0"
      TTS_SERVICE_URL: http://tts_service:8001
      TTS_CACHE_ROOT: /app/storage_local/tts_cache
      HF_HOME: /app/storage_local/tts_cache/hf
      TRANSFORMERS_CACHE: /app/storage_local/tts_cache/hf
      TORCH_HOME: /app/storage_local/tts_cache/torch
      TTS_CACHE_DIR: /app/storage_local/tts_cache/coqui
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/ready" ]
      interval: 60s
      timeout: 60s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ----------------------------------------------------------
  # Celery Render Worker
  # ----------------------------------------------------------
  worker:
    <<: *python-common
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.worker
      args:
        INSTALL_TEST_DEPS: "${INSTALL_TEST_DEPS:-1}"
        INSTALL_AVATAR_RUNTIME_DEPS: "${INSTALL_AVATAR_RUNTIME_DEPS:-1}"
        INSTALL_OPENMMLAB_DEPS: "${INSTALL_OPENMMLAB_DEPS:-1}"
        DOWNLOAD_LIVEPORTRAIT_WEIGHTS: "${DOWNLOAD_LIVEPORTRAIT_WEIGHTS:-1}"
        MMCV_VERSION: "${MMCV_VERSION:-2.0.1}"
        MMCV_CUDA: "${MMCV_CUDA:-cu118}"
        MMCV_TORCH: "${MMCV_TORCH:-torch2.0.0}"
        MMCV_FIND_LINKS: "${MMCV_FIND_LINKS:-https://download.openmmlab.com/mmcv/dist/cu118/torch2.0.0/index.html}"
        MMCV_WHEEL_URL: "${MMCV_WHEEL_URL:-}"
        MMCV_LOCAL_WHEEL: "${MMCV_LOCAL_WHEEL:-local_wheels/mmcv.whl}"
    image: ai_academy_worker:local
    user: root
    entrypoint: [ "sh", "/usr/local/bin/local-storage-entrypoint.sh" ]
    command: >
      sh -lc 'export LD_LIBRARY_PATH="$${AI_ACADEMY_LD_LIBRARY_PATH}:$${LD_LIBRARY_PATH}";
      if [ "$${AVATAR_BOOTSTRAP_ON_WORKER_STARTUP:-0}" = "1" ]; then
        python /app/worker/bootstrap_musetalk.py;
      else
        echo "Skipping avatar bootstrap on render worker";
      fi &&
      exec celery -A worker worker
      --loglevel=$${CELERY_LOG_LEVEL:-info}
      --concurrency=$${CELERY_WORKER_CONCURRENCY:-$${CELERY_CONCURRENCY:-1}}
      --prefetch-multiplier=$${CELERY_PREFETCH_MULTIPLIER:-1}
      -Q $${CELERY_WORKER_QUEUES:-render}'
    volumes:
      # Worker needs both its own source AND the api (config + core packages)
      - ../services:/app
      - ../services/worker:/app/worker
      - ../services/api:/app/api
      - ../tests:/app/tests:ro
      - ../services:/app/services:ro
      - ../infra/dockerfiles/local-storage-entrypoint.sh:/usr/local/bin/local-storage-entrypoint.sh:ro
      - ../storage_local:/app/storage_local

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      tts_service:
        # Let the worker boot while XTTS warms up; the task layer already polls /ready.
        condition: service_started
    environment:
      <<: *visual-moderation-env
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONPATH: /app/api:/app:/app/services/scripts:/app/services/tts_service:/app/services
      SQLITE_TEST_DATABASE_PATH: /tmp/ai_academy_worker_test.sqlite3
      STORAGE_ROOT: /app/storage_local
      LOCAL_STORAGE_PERMISSIVE_CHMOD: "${LOCAL_STORAGE_PERMISSIVE_CHMOD:-1}"
      LOCAL_STORAGE_DIR_MODE: "${LOCAL_STORAGE_DIR_MODE:-0777}"
      TORCH_HOME: /app/storage_local/models/torch
      XDG_CACHE_HOME: /app/storage_local/cache
      CELERY_RENDER_QUEUE: "${CELERY_RENDER_QUEUE:-render}"
      CELERY_AVATAR_QUEUE: "${CELERY_AVATAR_QUEUE:-avatar}"
      CELERY_WORKER_QUEUES: "${CELERY_RENDER_QUEUE:-render}"
      CELERY_WORKER_CONCURRENCY: "${CELERY_RENDER_WORKER_CONCURRENCY:-1}"
      AVATAR_BOOTSTRAP_ON_WORKER_STARTUP: "0"
      MUSETALK_USE_FAKE_MMPPOSE: "0"
      MUSETALK_REQUIRE_REAL_POSE: "1"
      TTS_SERVICE_URL: http://tts_service:8001
      TTS_SERVICE_TIMEOUT: "420"
      TTS_SERVICE_CONNECT_TIMEOUT: "10"
      TTS_READY_TIMEOUT: "420"
      TTS_READY_POLL_INTERVAL: "3"
      AVATAR_PREVIEW_DEBUG_ACCEPT_UNSTABLE: "${AVATAR_PREVIEW_DEBUG_ACCEPT_UNSTABLE:-0}"
      # Expose torch's bundled libnvrtc.so so CuDNN v8 finds it without JIT fallback.
      # Without this LD_LIBRARY_PATH, CuDNN logs "Applied workaround for CuDNN issue,
      # install nvrtc.so" and falls back to a 5-10x slower convolution path.
      LD_LIBRARY_PATH: /usr/local/lib/python3.10/site-packages/torch/lib
    extra_hosts:
      - "host.docker.internal:host-gateway"


  # ----------------------------------------------------------
  # Celery Avatar/GPU Worker
  # ----------------------------------------------------------
  worker-avatar:
    <<: *python-common
    build:
      context: ..
      dockerfile: infra/dockerfiles/Dockerfile.worker
      args:
        INSTALL_TEST_DEPS: "${INSTALL_TEST_DEPS:-1}"
        INSTALL_AVATAR_RUNTIME_DEPS: "${INSTALL_AVATAR_RUNTIME_DEPS:-1}"
        INSTALL_OPENMMLAB_DEPS: "${INSTALL_OPENMMLAB_DEPS:-1}"
        DOWNLOAD_LIVEPORTRAIT_WEIGHTS: "${DOWNLOAD_LIVEPORTRAIT_WEIGHTS:-1}"
        MMCV_VERSION: "${MMCV_VERSION:-2.0.1}"
        MMCV_CUDA: "${MMCV_CUDA:-cu118}"
        MMCV_TORCH: "${MMCV_TORCH:-torch2.0.0}"
        MMCV_FIND_LINKS: "${MMCV_FIND_LINKS:-https://download.openmmlab.com/mmcv/dist/cu118/torch2.0.0/index.html}"
        MMCV_WHEEL_URL: "${MMCV_WHEEL_URL:-}"
        MMCV_LOCAL_WHEEL: "${MMCV_LOCAL_WHEEL:-local_wheels/mmcv.whl}"
    image: ai_academy_worker:local
    user: root
    entrypoint: [ "sh", "/usr/local/bin/local-storage-entrypoint.sh" ]
    gpus: all
    command: >
      sh -lc 'export LD_LIBRARY_PATH="$${AI_ACADEMY_LD_LIBRARY_PATH}:$${LD_LIBRARY_PATH}";
      if [ "$${AVATAR_BOOTSTRAP_ON_WORKER_STARTUP:-1}" = "1" ]; then
        python /app/worker/bootstrap_musetalk.py;
      else
        echo "Skipping avatar bootstrap on avatar worker";
      fi &&
      exec celery -A worker worker
      --loglevel=$${CELERY_LOG_LEVEL:-info}
      --concurrency=$${CELERY_WORKER_CONCURRENCY:-$${CELERY_CONCURRENCY:-1}}
      --prefetch-multiplier=$${CELERY_PREFETCH_MULTIPLIER:-1}
      -Q $${CELERY_WORKER_QUEUES:-avatar}'
    volumes:
      # Worker needs both its own source AND the api (config + core packages)
      - ../services:/app
      - ../services/worker:/app/worker
      - ../services/api:/app/api
      - ../tests:/app/tests:ro
      - ../services:/app/services:ro
      - ../infra/dockerfiles/local-storage-entrypoint.sh:/usr/local/bin/local-storage-entrypoint.sh:ro
      - ../storage_local:/app/storage_local

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      tts_service:
        # Let the worker boot while XTTS warms up; the task layer already polls /ready.
        condition: service_started
    environment:
      <<: *visual-moderation-env
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONPATH: /app/api:/app:/app/services/scripts:/app/services/tts_service:/app/services
      SQLITE_TEST_DATABASE_PATH: /tmp/ai_academy_worker_test.sqlite3
      STORAGE_ROOT: /app/storage_local
      LOCAL_STORAGE_PERMISSIVE_CHMOD: "${LOCAL_STORAGE_PERMISSIVE_CHMOD:-1}"
      LOCAL_STORAGE_DIR_MODE: "${LOCAL_STORAGE_DIR_MODE:-0777}"
      TORCH_HOME: /app/storage_local/models/torch
      XDG_CACHE_HOME: /app/storage_local/cache
      CELERY_RENDER_QUEUE: "${CELERY_RENDER_QUEUE:-render}"
      CELERY_AVATAR_QUEUE: "${CELERY_AVATAR_QUEUE:-avatar}"
      CELERY_WORKER_QUEUES: "${CELERY_AVATAR_QUEUE:-avatar}"
      CELERY_WORKER_CONCURRENCY: "${CELERY_AVATAR_WORKER_CONCURRENCY:-1}"
      AVATAR_BOOTSTRAP_ON_WORKER_STARTUP: "1"
      MUSETALK_USE_FAKE_MMPPOSE: "0"
      MUSETALK_REQUIRE_REAL_POSE: "1"
      TTS_SERVICE_URL: http://tts_service:8001
      TTS_SERVICE_TIMEOUT: "420"
      TTS_SERVICE_CONNECT_TIMEOUT: "10"
      TTS_READY_TIMEOUT: "420"
      TTS_READY_POLL_INTERVAL: "3"
      AVATAR_PREVIEW_DEBUG_ACCEPT_UNSTABLE: "${AVATAR_PREVIEW_DEBUG_ACCEPT_UNSTABLE:-0}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Expose torch's bundled libnvrtc.so so CuDNN v8 finds it without JIT fallback.
      # Without this LD_LIBRARY_PATH, CuDNN logs "Applied workaround for CuDNN issue,
      # install nvrtc.so" and falls back to a 5-10x slower convolution path.
      LD_LIBRARY_PATH: /usr/local/lib/python3.10/site-packages/torch/lib
    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ----------------------------------------------------------
  # Redis – broker & cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - academy_net
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ----------------------------------------------------------
  # PostgreSQL – primary database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - academy_net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-academy_db}"
      POSTGRES_USER: "${POSTGRES_USER:-academy_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-strong-password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-academy_user} -d $${POSTGRES_DB:-academy_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # MinIO – local S3-compatible object storage
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks:
      - academy_net
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-change-me-minio-password}"
    volumes:
      - minio_data:/data
      - ../storage_local:/storage_local
    command: server /data --console-address ":9001"

  # ----------------------------------------------------------
  # LibreTranslate – optional translation service
  # ----------------------------------------------------------
  libretranslate:
    image: libretranslate/libretranslate:latest
    profiles:
      - translation
    ports:
      - "5000:5000"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: 5000
      LT_LOAD_ONLY: en,tr
    networks:
      - academy_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=5).read()\""
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ----------------------------------------------------------
  # Vite React frontend
  # ----------------------------------------------------------
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    networks:
      - academy_net
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ../services/frontend:/app
    # Runs Vite dev server for hot reloading in Docker
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"

# ----------------------------------------------------------
# Named volumes
# ----------------------------------------------------------
volumes:
  postgres_data:
  minio_data:
  redis_data:

    # ----------------------------------------------------------
    # Networks
    # ----------------------------------------------------------
networks:
  academy_net:
    driver: bridge
