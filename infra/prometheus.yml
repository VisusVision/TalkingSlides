global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alert-rules.yml

scrape_configs:
  - job_name: "vidlab-api-prometheus"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /api/v1/system/metrics/prometheus/
    # If endpoint token auth is enabled, route scrape traffic through an ingress/proxy
    # that injects `X-Metrics-Token: ${PROMETHEUS_METRICS_TOKEN}`.
