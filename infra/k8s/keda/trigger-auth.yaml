apiVersion: v1
kind: Secret
metadata:
  name: keda-prometheus-auth
  namespace: vidlab
type: Opaque
stringData:
  username: admin
  password: admin
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-prometheus-trigger-auth
  namespace: vidlab
spec:
  secretTargetRef:
    - parameter: username
      name: keda-prometheus-auth
      key: username
    - parameter: password
      name: keda-prometheus-auth
      key: password
