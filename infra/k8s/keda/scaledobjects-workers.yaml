apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-fast-autoscaler
  namespace: vidlab
spec:
  scaleTargetRef:
    name: worker-fast
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 24
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: vidlab_fast_queue_depth
        threshold: "12"
        query: max(vidlab_render_queue_depth{profile="fast"})
      authenticationRef:
        name: keda-prometheus-trigger-auth
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: vidlab_fast_p95
        threshold: "90"
        query: max(vidlab_jobs_latency_p95_seconds)
      authenticationRef:
        name: keda-prometheus-trigger-auth
---
